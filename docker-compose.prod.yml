services:

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      # pg_isready é o check canônico do Postgres — não exige conexão real
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    # --requirepass: protege Redis com password (lido de .env.prod)
    # --appendonly yes: persistência AOF (Append-Only File)
    # --maxmemory + allkeys-lru: limite de memória + eviction strategy
    command: >
      redis-server
      --requirepass "$${REDIS_PASSWORD}"
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ghcr.io/developreiloyo/descubrasul-site/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - APPLY_MIGRATIONS=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - easypanel

  celery:
    image: ghcr.io/developreiloyo/descubrasul-site/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: celery -A core worker -l info
    env_file: .env.prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  celery-beat:
    image: ghcr.io/developreiloyo/descubrasul-site/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: celery -A core beat -l info
    env_file: .env.prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    image: ghcr.io/developreiloyo/descubrasul-site/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.prod
    environment:
      - API_URL_INTERNAL=http://backend:8000/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - easypanel

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
  easypanel:
    external: true
    name: easypanel
