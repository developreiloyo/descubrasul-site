# ──────────────────────────────────────────────────────────────────────
# docker-compose.easypanel.yml
#
# Versión del stack adaptada para EasyPanel COMPOSE.
# Diferencias con docker-compose.prod.yml:
#   1. Sin sección `networks` (EasyPanel inyecta la red del proyecto)
#   2. Sin `${IMAGE_TAG}` — usa siempre `:latest` (rollback via revert + push)
#   3. Sin `env_file: .env.prod` — las envs se cargan desde la UI de EasyPanel
#   4. Servicios `db` y `redis` no exponen `ports:` al host (solo red interna)
#   5. Backend y frontend sin `ports:` — Traefik los rutea por nombre interno
#
# Para pegar en: EasyPanel → proyecto descubrasul → servicio app → Fuente
# ──────────────────────────────────────────────────────────────────────

services:

  # ─── Base de datos: Postgres 16 con extensión pgvector ───────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Cache + broker Celery: Redis 7 con password y persistencia AOF ──
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass "$${REDIS_PASSWORD}"
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  # ─── Backend Django + Gunicorn ──────────────────────────────────────
  backend:
    image: ghcr.io/developreiloyo/descubrasul-site/backend:latest
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_ENDPOINT_URL=${R2_ENDPOINT_URL}
      - R2_PUBLIC_DOMAIN=${R2_PUBLIC_DOMAIN}
      - EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
      - EMAIL_HOST=smtp.resend.com
      - EMAIL_PORT=465
      - EMAIL_USE_SSL=True
      - EMAIL_HOST_USER=resend
      - EMAIL_HOST_PASSWORD=${RESEND_API_KEY}
      - FRONTEND_URL=https://descubrasul.com
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Worker Celery (procesa tasks async: geocoding, analytics, IA) ──
  celery:
    image: ghcr.io/developreiloyo/descubrasul-site/backend:latest
    restart: unless-stopped
    command: celery -A core worker -l info --concurrency=2 --max-tasks-per-child=100
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_ENDPOINT_URL=${R2_ENDPOINT_URL}
      - R2_PUBLIC_DOMAIN=${R2_PUBLIC_DOMAIN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Beat Celery (scheduler: aggrega analytics nocturnamente) ───────
  celery-beat:
    image: ghcr.io/developreiloyo/descubrasul-site/backend:latest
    restart: unless-stopped
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend Next.js standalone ────────────────────────────────────
  frontend:
    image: ghcr.io/developreiloyo/descubrasul-site/frontend:latest
    restart: unless-stopped
    environment:
      # SSR (container → container, red interna de EasyPanel)
      - API_URL_INTERNAL=http://backend:8000/api
      # NEXT_PUBLIC_API_URL viene inlineada en el bundle desde el build (deploy.yml)
      # No hace falta declararla acá.
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
