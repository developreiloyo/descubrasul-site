name: Build y deploy a producción

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:

  test:
    name: Correr tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Bajar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias del sistema
        run: sudo apt-get install -y libmagic1

      - name: Instalar dependencias Python
        run: pip install -r backend/requirements.txt

      - name: Correr tests Django
        working-directory: backend
        env:
          SECRET_KEY: test-secret-key-only-for-ci
          DEBUG: 'True'
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: core.settings.dev
        run: python manage.py test --verbosity=2

  build:
    name: Build imágenes Docker
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image_tag: ${{ steps.tag.outputs.version }}

    steps:
      - name: Bajar el código
        uses: actions/checkout@v4

      - name: Login a ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar tag
        id: tag
        run: |
          TAG=$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Tag generado: $TAG"

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/developreiloyo/descubrasul-site/backend:${{ steps.tag.outputs.version }}
            ghcr.io/developreiloyo/descubrasul-site/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/developreiloyo/descubrasul-site/frontend:${{ steps.tag.outputs.version }}
            ghcr.io/developreiloyo/descubrasul-site/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy a producción
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Bajar el código
        uses: actions/checkout@v4

      - name: Copiar docker-compose.prod.yml al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/var/www/descubrasul"

      - name: Deploy al VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/var/www/descubrasul"
            IMAGE_TAG="${{ needs.build.outputs.image_tag }}"

            echo "▶ Desplegando versión: $IMAGE_TAG"

            cd $APP_DIR

            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ghcr.io/developreiloyo/descubrasul-site/backend:$IMAGE_TAG
            docker pull ghcr.io/developreiloyo/descubrasul-site/frontend:$IMAGE_TAG

            if [ -f .current_tag ]; then
              cp .current_tag .previous_tag
            fi
            echo $IMAGE_TAG > .current_tag

            export IMAGE_TAG=$IMAGE_TAG
            export POSTGRES_DB=$(grep POSTGRES_DB .env.prod | cut -d= -f2)
            export POSTGRES_USER=$(grep POSTGRES_USER .env.prod | cut -d= -f2)
            export POSTGRES_PASSWORD=$(grep POSTGRES_PASSWORD .env.prod | cut -d= -f2)

            docker compose -f docker-compose.prod.yml up -d --no-build --remove-orphans

            sleep 10
            docker compose -f docker-compose.prod.yml ps

            echo "✅ Deploy $IMAGE_TAG completado"