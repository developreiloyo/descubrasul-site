name: Build y push de imágenes a GHCR

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

# Evita que dos pushes consecutivos a main corran en paralelo y se pisen.
# El más reciente cancela al anterior.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    name: Tests Django
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector/pgvector:pg16 — necesario porque las migrations crean
        # la extensión vector. postgres:16 vanilla falla en CREATE EXTENSION.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps
        run: sudo apt-get install -y libmagic1

      - name: Install Python deps
        run: pip install -r backend/requirements.txt

      - name: Run migrations
        working-directory: backend
        env:
          SECRET_KEY: test-secret-key-only-for-ci
          DEBUG: 'True'
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: core.settings.dev
        run: python manage.py migrate --noinput

      - name: Run tests
        working-directory: backend
        env:
          SECRET_KEY: test-secret-key-only-for-ci
          DEBUG: 'True'
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: core.settings.dev
        run: python manage.py test --verbosity=2

  build:
    name: Build y push imágenes
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar tag
        id: tag
        run: |
          TAG=$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "▶ Tag generado: $TAG"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/developreiloyo/descubrasul-site/backend:${{ steps.tag.outputs.version }}
            ghcr.io/developreiloyo/descubrasul-site/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/developreiloyo/descubrasul-site/frontend:${{ steps.tag.outputs.version }}
            ghcr.io/developreiloyo/descubrasul-site/frontend:latest
          # NEXT_PUBLIC_* se inlinean en build time, no en runtime.
          # Sin esto el cliente JS queda con process.env.NEXT_PUBLIC_* = undefined.
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.descubrasul.com/api
            NEXT_PUBLIC_GA4_ID=
            NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Build exitoso" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: \`${{ steps.tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Imágenes publicadas en GHCR**:" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/developreiloyo/descubrasul-site/backend:${{ steps.tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/developreiloyo/descubrasul-site/frontend:${{ steps.tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Próximo paso" >> $GITHUB_STEP_SUMMARY
          echo "Ir a EasyPanel → proyecto \`descubrasul\` → click **Implementar**" >> $GITHUB_STEP_SUMMARY
