services:

  # ─── Backend Django ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn core.wsgi:application --config gunicorn.conf.py
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
      - media_files:/app/mediafiles
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - descubrasul_network

  # ─── Celery Worker ────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A core worker -l info --concurrency 2
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - descubrasul_network

  # ─── Celery Beat ──────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - descubrasul_network

  # ─── Frontend Next.js ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - descubrasul_network

  # ─── PostgreSQL + pgvector ────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-descubrasul}
      POSTGRES_USER: ${POSTGRES_USER:-descubrasul_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-descubrasul_user} -d ${POSTGRES_DB:-descubrasul}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - descubrasul_network

  # ─── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - descubrasul_network

# ─── Volumes ────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

# ─── Networks ───────────────────────────────────────────────────────
networks:
  descubrasul_network:
    driver: bridge
